<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博老虎机 - B站抽象视频生成器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF2D6A;
            --secondary: #00F5D4;
            --accent: #FFE66D;
            --bg: #0D0221;
            --text: #FFFFFF;
            --text-dim: #B8B8D1;
            --glow: rgba(255, 45, 106, 0.6);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 245, 212, 0.03) 2px,
                    rgba(0, 245, 212, 0.03) 4px
                );
            pointer-events: none;
            z-index: 1000;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 40px 0 30px;
        }

        .title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px var(--glow);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            color: var(--accent);
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .machine-frame {
            background: linear-gradient(145deg, rgba(255,45,106,0.1), rgba(0,245,212,0.1));
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            box-shadow:
                0 0 30px rgba(255, 45, 106, 0.3),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .machine-frame::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                var(--primary),
                transparent,
                var(--secondary),
                transparent
            );
            animation: rotate 4s linear infinite;
            opacity: 0.1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .slot {
            width: 160px;
            height: 240px;
            background: rgba(13, 2, 33, 0.9);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow:
                0 0 20px rgba(0, 245, 212, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
        }

        .slot-label {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: var(--bg);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px;
            text-align: center;
            z-index: 2;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .slot-window {
            flex: 1;
            padding: 5px 0;
            perspective: 300px;
            overflow: hidden;
        }

        .slot-reel {
            transform-style: preserve-3d;
            animation: none;
        }

        .slot-reel.spinning {
            animation: slotSpin 0.1s linear infinite;
        }

        .slot-item {
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            padding: 5px 10px;
            text-align: center;
            word-break: break-word;
            background: transparent;
            transition: all 0.3s;
        }

        .slot-item.active {
            background: linear-gradient(90deg, transparent, rgba(0, 245, 212, 0.2), transparent);
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        @keyframes slotSpin {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-30deg); }
        }

        .slot-indicator {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            height: 60px;
            background: linear-gradient(
                to bottom,
                transparent,
                rgba(255, 230, 109, 0.15) 20%,
                rgba(255, 230, 109, 0.25) 50%,
                rgba(255, 230, 109, 0.15) 80%,
                transparent
            );
            pointer-events: none;
            z-index: 3;
        }

        .slot-indicator::before,
        .slot-indicator::after {
            content: '▼';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-size: 12px;
            opacity: 0.8;
        }

        .slot-indicator::before { top: -5px; }
        .slot-indicator::after { bottom: -5px; transform: translateX(-50%) rotate(180deg); }

        .slot-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            flex-shrink: 0;
        }

        .lock-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 700;
            z-index: 5;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .lock-btn:hover {
            background: var(--secondary);
            color: var(--bg);
        }

        .lock-btn.locked {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .lock-btn .lock-icon {
            font-size: 0.6rem;
        }

        .disable-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #666;
            color: #666;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 700;
            z-index: 5;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .disable-btn:hover {
            background: #666;
            color: white;
        }

        .disable-btn.disabled {
            background: #333;
            border-color: #333;
            color: #888;
            text-decoration: line-through;
        }

        .slot.disabled-slot {
            opacity: 0.4;
        }

        .slot.disabled-slot .slot-reel {
            filter: grayscale(1);
        }

        .custom-panel {
            background: rgba(13, 2, 33, 0.95);
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .custom-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .custom-panel-title {
            color: var(--accent);
            font-size: 1rem;
            font-weight: 700;
        }

        .custom-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            justify-content: space-between;
        }

        .custom-input-group label {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--text-dim);
            flex: 1;
            min-width: 0;
        }

        .custom-input-group input[type="text"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--secondary);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.85rem;
            width: 100%;
            box-sizing: border-box;
        }

        .custom-input-group input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 230, 109, 0.3);
        }

        .custom-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .custom-tag {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .custom-tag .remove-tag {
            cursor: pointer;
            opacity: 0.7;
        }

        .custom-tag .remove-tag:hover {
            opacity: 1;
        }

        .add-custom-btn {
            background: var(--secondary);
            color: var(--bg);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .add-custom-btn:hover {
            background: var(--accent);
        }

        .controls {
            text-align: center;
            margin: 30px 0;
        }

        .spin-btn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            padding: 18px 60px;
            background: linear-gradient(135deg, var(--primary), #FF6B9D);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow:
                0 0 30px var(--glow),
                0 10px 40px rgba(255, 45, 106, 0.4);
            letter-spacing: 4px;
        }

        .spin-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s;
        }

        .spin-btn:hover::before {
            left: 100%;
        }

        .spin-btn:hover {
            transform: translateY(-3px);
            box-shadow:
                0 0 50px var(--glow),
                0 15px 50px rgba(255, 45, 106, 0.5);
        }

        .spin-btn:active {
            transform: translateY(0);
        }

        .spin-btn:disabled {
            background: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        .spin-btn:disabled::before {
            display: none;
        }

        .result-section {
            margin-top: 40px;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: rgba(13, 2, 33, 0.95);
            border: 2px solid var(--secondary);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.2);
        }

        .result-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .result-title {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .result-subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .result-item {
            background: rgba(255, 45, 106, 0.1);
            border: 1px solid rgba(255, 45, 106, 0.3);
            border-radius: 12px;
            padding: 20px;
        }

        .result-item h4 {
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-item h4::before {
            content: '▸';
            color: var(--secondary);
        }

        .result-item p {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.6;
        }

        .prompt-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            font-family: monospace;
            position: relative;
        }

        .keyword-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .keyword-tag {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .action-btn {
            font-family: 'Noto Sans SC', sans-serif;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid;
        }

        .action-btn.primary {
            background: transparent;
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn.primary:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px var(--glow);
        }

        .action-btn.secondary {
            background: transparent;
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .action-btn.secondary:hover {
            background: var(--secondary);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.5);
        }

        /* AI脚本生成区域样式 */
        .ai-script-section {
            background: linear-gradient(145deg, rgba(255,45,106,0.15), rgba(0,245,212,0.15));
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 0 40px rgba(255, 230, 109, 0.15);
        }

        .ai-script-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .ai-script-header h3 {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ai-script-header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .duration-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .duration-label {
            color: var(--text);
            font-weight: 700;
        }

        .duration-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .duration-btn:hover {
            background: var(--secondary);
            color: var(--bg);
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4);
        }

        .duration-btn.active {
            background: var(--secondary);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.6);
        }

        .ai-provider-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .provider-label {
            color: var(--text);
            font-weight: 700;
        }

        .provider-select {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            min-width: 150px;
        }

        .provider-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 230, 109, 0.3);
        }

        .provider-select option {
            background: var(--bg);
            color: var(--text);
        }

        .api-key-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            width: 200px;
        }

        .api-key-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 230, 109, 0.3);
        }

        .api-key-input::placeholder {
            color: var(--text-dim);
        }

        .generate-script-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 25px;
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--primary), #FF6B9D);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(255, 45, 106, 0.4);
        }

        .generate-script-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(255, 45, 106, 0.6);
        }

        .generate-script-btn:disabled {
            background: #444;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-icon {
            font-size: 1.3rem;
        }

        .script-loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 45, 106, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .script-loading p {
            color: var(--accent);
            font-size: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .script-result {
            background: rgba(13, 2, 33, 0.95);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }

        .script-footer {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 245, 212, 0.3);
        }

        .script-actions-left {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
        }

        .script-action-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .retry-btn {
            background: rgba(255, 45, 106, 0.2);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .retry-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(255, 45, 106, 0.4);
        }

        .copy-btn {
            background: var(--secondary);
            color: var(--bg);
        }

        .copy-btn:hover {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(255, 230, 109, 0.4);
        }

        .script-content {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 20px;
            line-height: 1.8;
            color: var(--text);
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .script-content h4 {
            color: var(--accent);
            margin: 15px 0 10px;
            font-size: 1.1rem;
            font-weight: 700;
            background: none;
            border: none;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
        }

        .script-content h4:first-child {
            margin-top: 0;
        }

        .script-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .script-tag {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .error-message {
            background: rgba(255, 45, 106, 0.2);
            border: 1px solid var(--primary);
            border-radius: 10px;
            padding: 15px;
            color: var(--primary);
            text-align: center;
            margin-top: 20px;
        }

        /* 提示词编辑器样式 */
        .prompt-editor-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 230, 109, 0.3);
            border-radius: 12px;
            margin: 20px 0;
            overflow: hidden;
        }

        .prompt-editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 230, 109, 0.1);
            cursor: pointer;
        }

        .prompt-editor-label {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .toggle-prompt-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .toggle-prompt-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .prompt-editor-container {
            padding: 15px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .full-prompt-display {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--secondary);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            color: var(--text);
            font-size: 0.85rem;

                        customKeywords[type].push(value);
                        input.value = '';

                        lockedValues[type] = value;

        function spinSlot(slotId, reelId, duration, forcedItem) {
            return new Promise(resolve => {
                const reel = document.getElementById(reelId);
                const slotKey = slotId.replace('slot-', '');
                const items = getMergedData(slotKey);
                const itemCount = items.length;

                reel.classList.add('spinning');
                reel.style.transition = 'none';

                const randomStart = Math.floor(Math.random() * itemCount);
                const randomExtra = Math.floor(Math.random() * itemCount) + 1;
                let position = randomStart * 55;
                const spinDuration = duration;
                const startTime = Date.now();

                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / spinDuration, 1);

                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const totalDistance = (itemCount * 3 + randomExtra) * 55;
                    position = (randomStart * 55) + totalDistance * easeOut;

                    reel.style.transform = `translateY(-${position % (itemCount * 3 * 55) + 55}px)`;

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        reel.classList.remove('spinning');
                        let finalIndex;
                        if (forcedItem) {
                            finalIndex = items.indexOf(forcedItem);
                            if (finalIndex === -1) finalIndex = Math.floor(Math.random() * itemCount);
                        } else {
                            const finalPosition = Math.floor(position / 55);
                            finalIndex = finalPosition % itemCount;
                        }
                        const selectedItem = items[finalIndex];
                        reel.innerHTML = '';
                        for (let i = 0; i < 3; i++) {
                            const div = document.createElement('div');
                            div.className = 'slot-item';
                            const idx = (finalIndex + i - 1 + itemCount) % itemCount;
                            div.textContent = items[idx];
                            if (i === 1) {
                                div.classList.add('active');
                            }
                            reel.appendChild(div);
                        }
                        reel.style.transform = 'translateY(0px)';
                        reel.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        setTimeout(() => resolve(selectedItem), 350);
                    }
                }

                requestAnimationFrame(animate);
            });
        }

                },
                body: JSON.stringify({
                    model: 'claude-3-sonnet-20240229',
                    max_tokens: 20000,
                    temperature: 0.9,
                    system: '你是一个深谙中文互联网抽象文化的创意编剧，说话有梗、幽默、不正经。',
                    messages: [
                        { role: 'user', content: prompt }
                    ]
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(`Claude API错误: ${error.error?.message || '未知错误'}`);
            }

            const data = await response.json();
            return data.content[0].text;
        }

        async function callGemini(apiKey, prompt) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `你是一个深谙中文互联网抽象文化的创意编剧，说话有梗、幽默、不正经。\n\n${prompt}`
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.9,
                        maxOutputTokens: 20000
                    }
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(`Gemini API错误: ${error.error?.message || '未知错误'}`);
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function callCustomAPI(apiKey, prompt) {
            // 自定义API调用模板，用户可根据自己的API修改
            const customEndpoint = prompt('请输入自定义API的端点URL：');
            if (!customEndpoint) {
                throw new Error('未提供自定义API端点');
            }

            const response = await fetch(customEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    prompt: prompt,
                    max_tokens: 20000
                })
            });

            if (!response.ok) {
                throw new Error('自定义API调用失败');
            }

            const data = await response.json();
            return data.text || data.response || data.content || JSON.stringify(data);
        }

        function displayScript(content, duration) {
            const resultDiv = document.getElementById('scriptResult');
            const contentDiv = document.getElementById('scriptContent');

            // 先清空内容容器，避免残留旧内容
            contentDiv.innerHTML = '';

            // 清理内容中的按钮和其他交互元素
            let cleanContent = content
                .replace(/<button[^>]*>.*?<\/button>/gi, '')
                .replace(/<a[^>]*>.*?<\/a>/gi, '')
                .replace(/onclick="[^"]*"/gi, '');

            // 将markdown转换为HTML
            let htmlContent = cleanContent
                .replace(/^### (.*$)/gim, '<h4>$1</h4>')
                .replace(/^## (.*$)/gim, '<h4>$1</h4>')
                .replace(/^# (.*$)/gim, '<h4>$1</h4>')
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/\n/gim, '<br>');

            contentDiv.innerHTML = htmlContent;

            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function showError(message) {
            const resultDiv = document.getElementById('scriptResult');
            const contentDiv = document.getElementById('scriptContent');

            contentDiv.innerHTML = `<div class="error-message">
                <strong>❌ 生成失败</strong><br><br>
                ${message}<br><br>
                <small>提示：请检查API Key是否正确，或尝试切换其他AI模型</small>
            </div>`;

            resultDiv.style.display = 'block';
        }

        function copyScript() {
            const content = document.getElementById('scriptContent').innerText;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.querySelector('.copy-script-btn');
                btn.textContent = '✅ 已复制';
                setTimeout(() => btn.textContent = '📋 复制脚本', 20000);
            });
        }

        document.getElementById('spinBtn').addEventListener('click', spinAll);

        initReels();

        document.querySelectorAll('.slot-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                if (!item.classList.contains('active')) {
                    item.style.color = 'var(--secondary)';
                }
            });
            item.addEventListener('mouseleave', () => {
                if (!item.classList.contains('active')) {
                    item.style.color = '';
                }
            });
        });
    </script>
</body>
</html>
